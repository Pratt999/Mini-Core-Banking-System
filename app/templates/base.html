<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Banking System - VIT Project{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <style>
        :root {
            --primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --primary-light: #a8b6ff;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
        }
        body { font-family: 'Inter', sans-serif; background: #f8f9ff; }
        .navbar-brand { font-weight: 700; font-size: 1.5rem; }
        .sidebar { 
            min-height: 100vh; 
            background: var(--primary); 
            color: white; 
            padding-top: 1rem;
        }
        .sidebar .nav-link { 
            color: rgba(255,255,255,0.8); 
            padding: 1rem 1.5rem; 
            border-radius: 0 20px 20px 0; 
            margin: 0.25rem 0;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { 
            background: rgba(255,255,255,0.2); 
            color: white; 
        }
        .stat-card { 
            background: white; 
            border-radius: 15px; 
            padding: 2rem; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-number { font-size: 2.5rem; font-weight: 700; }
        .table { border-radius: 10px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .table thead th { background: var(--primary); color: white; border: none; }
        .btn-modern { 
            border-radius: 25px; 
            padding: 10px 25px; 
            font-weight: 500; 
            border: none; 
            transition: all 0.3s ease;
        }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="position-fixed top-0 end-0 p-3" style="z-index: 1050;">
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar col-md-2 col-lg-2 px-0">
            <div class="p-3">
                <a class="navbar-brand d-flex align-items-center text-white text-decoration-none" href="{{ url_for('main.dashboard') }}">
                    <i class="fas fa-university fa-2x me-2"></i>
                    <span>BankingSys</span>
                </a>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link active" href="{{ url_for('main.dashboard') }}">
                    <i class="fas fa-chart-line me-2"></i>Dashboard
                </a>
                <a class="nav-link" href="{{ url_for('main.customers') }}">
                    <i class="fas fa-users me-2"></i>Customers
                </a>
                <a
