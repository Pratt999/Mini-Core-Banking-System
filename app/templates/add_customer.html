<!DOCTYPE html>
<html>
<head>
    <title>Add Customer - Banking System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f6fa; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1rem 2rem; }
        .container { max-width: 600px; margin: 2rem auto; padding: 2rem; background: white; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: #333; }
        input, textarea, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 5px; font-size: 16px; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
        button:hover { background: #218838; }
        .back-btn { display: inline-block; margin-bottom: 1rem; color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>➕ Add New Customer</h1>
    </div>
    
    <div class="container">
        <a href="{{ url_for('main.customers') }}" class="back-btn">← Back to Customers</a>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div style="padding: 1rem; margin-bottom: 1rem; border-radius: 5px; background: {{ 'lightgreen' if category == 'success' else 'lightcoral' }}; color: {{ 'darkgreen' if category == 'success' else 'darkred' }};">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="form-group">
                <label>Customer ID * (e.g., CUST001)</label>
                <input type="text" name="customer_id" required>
            </div>
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone">
            </div>
            <div class="form-group">
                <label>Address</label>
                <textarea name="address" rows="3"></textarea>
            </div>
            <button type="submit">✅ Add Customer</button>
        </form>
    </div>
</body>
</html>
