version: '3.8'

services:
  web:
    build: .
    command: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:5000 run:app
    volumes:
      - .:/app
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=core_banking
    ports:
      - "5432:5432"

  redis:
    image: redis:7

  worker:
    build: .
    command: celery -A app.celery.celery worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - db

volumes:
  postgres_data:
