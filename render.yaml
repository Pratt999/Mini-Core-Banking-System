services:
  # Web service for the Flask app
  - type: web
    name: nexus-banking
    runtime: docker
    plan: free
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: FLASK_DEBUG
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: nexus-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: nexus-redis
          property: connectionString
      - fromGroup: nexus-secrets

  # Celery Worker service
  - type: worker
    name: nexus-worker
    runtime: docker
    dockerCommand: celery -A app.celery.celery worker --loglevel=info
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: nexus-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: nexus-redis
          property: connectionString
      - fromGroup: nexus-secrets

  # Redis instance
  - type: redis
    name: nexus-redis
    plan: free
    ipAllowList: [] # Only allow internal connections

databases:
  - name: nexus-db
    plan: free

envVarGroups:
  - name: nexus-secrets
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
