<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Banking System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav>
    <a href="{{ url_for('api.index') }}">🏦 Dashboard</a>
    <a href="{{ url_for('api.new_customer') }}">👤 New Customer</a>
    <a href="{{ url_for('api.list_accounts') }}">💳 Accounts</a>
    <a href="{{ url_for('api.list_transactions') }}">📊 Transactions</a>
    <span style="float:right; font-size: 0.85rem; opacity: 0.8;">
      <kbd>Ctrl+1</kbd> Dashboard |
      <kbd>Ctrl+2</kbd> New Cust |
      <kbd>Ctrl+3</kbd> Accounts |
      <kbd>Ctrl+D</kbd> Dark
    </span>
  </nav>

  <div class="container">
    <div id="flash-messages"></div>
    {% block content %}{% endblock %}
  </div>

  <footer style="text-align:center; margin-top:2rem; opacity:0.7; font-size:0.85rem;">
    Banking System • ACID Transactions Demo • 2026
  </footer>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
